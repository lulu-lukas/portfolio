<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Lukas Doorleijers — Game Developer</title>

        <style>

            :root{
                --bg:#0f1724;
                --card:#111a2e;
                --muted:#9aa4b2;
                --accent:#7c3aed;
                --radius:14px;
            }

            *{box-sizing:border-box}

            body{
                margin:0;
                font-family:system-ui;
                background:linear-gradient(180deg,#071025,#0b1220);
                color:white;
            }

            .container{
                max-width:1100px;
                margin:auto;
                padding:20px;
            }

            header{
                display:flex;
                justify-content:space-between;
                align-items:center;
                margin-bottom:20px;
            }

            .logo{
                background:linear-gradient(135deg,#7c3aed,#3b82f6);
                width:44px;
                height:44px;
                display:flex;
                align-items:center;
                justify-content:center;
                border-radius:10px;
                font-weight:700;
            }

            nav ul{
                display:flex;
                gap:14px;
                list-style:none;
                padding:0;
            }

            nav a{
                color:var(--muted);
                font-weight:600;
            }

            nav a:hover{
                color:white;
            }

            .card{
                background:var(--card);
                padding:24px;
                border-radius:var(--radius);
                margin-bottom:20px;
            }

            .grid{
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
                gap:20px;
            }

            .project{
                background:#0b1424;
                padding:14px;
                border-radius:12px;
                cursor:pointer;
            }

            .project img{
                width:100%;
                border-radius:10px;
            }

            .tags{
                margin-top:8px;
                display:flex;
                gap:6px;
                flex-wrap:wrap;
            }

            .tag{
                background:#1c2540;
                padding:4px 10px;
                border-radius:999px;
                font-size:12px;
                color:var(--muted);
            }

            .btn{
                background:linear-gradient(90deg,#7c3aed,#3b82f6);
                padding:10px 16px;
                border-radius:10px;
                display:inline-block;
                margin-top:10px;
                font-weight:700;
            }

            video{
                width:100%;
                border-radius:10px;
            }

            pre{
                background:#060c18;
                padding:14px;
                border-radius:10px;
                overflow:auto;
            }

            .muted{color:var(--muted)}

            .gallery img{
                max-width:600px;
                width:100%;
                border-radius:10px;
                margin-bottom:12px;
            }

        </style>
    </head>


    <body>

        <div class="container">

            <header>

                <div style="display:flex;gap:12px;align-items:center">
                    <div class="logo">LD</div>

                    <div>
                        <div style="font-weight:700">Lukas Doorleijers</div>
                        <div class="muted" style="font-size:12px">Game Developer</div>
                    </div>

                </div>

                <nav>
                    <ul>

                        <li><a href="#/">Home</a></li>
                        <li><a href="#/projects">Projects</a></li>
                        <li><a href="#/mechanics">Gameplay Mechanics</a></li>
                        <li><a href="#/videos">Mini Project Videos</a></li>
                        <li><a href="#/code">Code Examples</a></li>
                        <li><a href="#/about">About</a></li>

                    </ul>
                </nav>

            </header>


            <main id="root"></main>

        </div>


        <script>

            const DATA = {

                meta:{
                    name:"Lukas Doorleijers"
                },

                projects:[

                    {
                        id:0,
                        title:"Isle of Arcana",
                        year:2025,
                        featured:true,
                        summary:"A progressive 2D platformer where players explore a mysterious island while unlocking abilities.",
                        tech:["Unity","C#"],
                        image:"images/0DqgbT.png",
                        link:"https://lulu-lukas.itch.io/isle-of-arcana",
                        gifs:[
                            "images/gif 1.gif",
                            "images/gif 2.gif",
                            "images/gif 3.gif"
                        ]
                    },

                    {
                        id:1,
                        title:"3D Shooter Game",
                        year:2024,
                        summary:"A procedural 3D shooter with generated levels.",
                        tech:["Unity","C#"],
                        image:"images/img.png",
                        link:"https://lulu-lukas.itch.io/3d-shootergame",
                        gifs:[
                            "images/gif 4.gif"
                        ]
                    },

                    {
                        id:2,
                        title:"Horror carnaval Prototype",
                        year:2026,
                        summary:"A short horror experience focusing on atmosphere and tension.",
                        release:"This game isn't out yet and will likely release in summer.",
                        tech:["Unity","C#"],
                        image:"images/horror.png",
                        gifs:[
                            "images/carnaval.gif"
                        ]
                    }

                ],

                mechanics:[

                    {
                        title:"Procedural Level Generation",
                        desc:"Levels are dynamically generated to create unique playthroughs."
                    },

                    {
                        title:"Progressive Ability System",
                        desc:"Players unlock abilities that expand traversal options."
                    },

                    {
                        title:"Enemy AI Behaviour",
                        desc:"Enemies adapt to the player based on distance and line of sight."
                    }

                ],

                videos:[

                    {
                        title:"vr game prototype",
                        video:"images/Vr Game Showcase Video.mp4",
                        desc:"a small vr prototype."
                    },

                    {
                        title:"horror carnaval prototype",
                        video:"images/carnaval.mp4",
                        desc:"sneak peak to my new game."
                    }

                ],

                code:[

                    {
                        title:"Player Movement Script",
                        language:"C#",
                        code:`public class PlayerMovement : MonoBehaviour
{
public float speed = 5f;

void Update()
{
float h = Input.GetAxis("Horizontal");
float v = Input.GetAxis("Vertical");

Vector3 move = new Vector3(h,0,v);
transform.Translate(move * speed * Time.deltaTime);
}
}`
                    }

                ]

            };


            function router(){

                const hash = location.hash.replace("#","") || "/";

                const parts = hash.split("/");

                if(hash=="/") home();
                else if(hash=="/projects") projects();
                else if(parts[1]=="project") projectDetail(parts[2]);
                else if(hash=="/mechanics") mechanics();
                else if(hash=="/videos") videos();
                else if(hash=="/code") code();
                else if(hash=="/about") about();

            }

            window.addEventListener("hashchange",router);
            window.addEventListener("load",router);

            const root=document.getElementById("root");


            function home(){

                root.innerHTML=`

<section class="card">

<h1>Game Developer Portfolio</h1>

<p class="muted">
I create immersive gameplay experiences in Unity and Unreal Engine.
</p>

</section>


<section class="card">

<h2>Featured Project</h2>

${DATA.projects.filter(p=>p.featured).map(p=>`

<div class="project" onclick="location.href='#/project/${p.id}'">

<img src="${p.image}">

<h3>${p.title}</h3>

<p class="muted">${p.summary}</p>

</div>

`).join("")}

</section>


<section class="card">

<h2>Sneak Peaks</h2>

<div class="grid">

${DATA.projects.slice(0,3).map(p=>`

<div class="project" onclick="location.href='#/project/${p.id}'">

<img src="${p.image}">

<h3>${p.title}</h3>

<p class="muted">${p.summary}</p>

</div>

`).join("")}

</div>

</section>

`;

            }



            function projects(){

                root.innerHTML=`

<h1>Projects</h1>

<div class="grid">

${DATA.projects.map(p=>`

<div class="project" onclick="location.href='#/project/${p.id}'">

<img src="${p.image}">

<h3>${p.title} (${p.year})</h3>

<p class="muted">${p.summary}</p>

<div class="tags">

${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}

</div>

</div>

`).join("")}

</div>

`;

            }



            function projectDetail(id){

                const p=DATA.projects.find(x=>x.id==id)

                root.innerHTML=`

<a href="#/projects" class="tag">← Back to projects</a>

<h1>${p.title}</h1>

<p class="muted">${p.summary}</p>

${p.release?`<p class="muted">${p.release}</p>`:""}

<div class="tags">
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>

<br>

${p.link?`<a class="btn" href="${p.link}" target="_blank">Play on Itch.io</a>`:""}

<br><br>

<div class="gallery">

${p.gifs?p.gifs.map(g=>`<img src="${g}">`).join(""):""}

</div>

`;

            }



            function mechanics(){

                root.innerHTML=`

<h1>Gameplay Mechanics</h1>

<div class="grid">

${DATA.mechanics.map(m=>`

<div class="card">

<h3>${m.title}</h3>

<p class="muted">${m.desc}</p>

</div>

`).join("")}

</div>

`;

            }



            function videos(){

                root.innerHTML=`

<h1>Mini Project Videos</h1>

<div class="grid">

${DATA.videos.map(v=>`

<div class="project">

<h3>${v.title}</h3>

<video controls src="${v.video}"></video>

<p class="muted">${v.desc}</p>

</div>

`).join("")}

</div>

`;

            }



            function code(){

                root.innerHTML=`

<h1>Code Examples</h1>

${DATA.code.map(c=>`

<div class="card">

<h3>${c.title}</h3>

<pre>${c.code}</pre>

</div>

`).join("")}

`;

            }



            function about(){

                root.innerHTML=`

<div class="card">

<h1>About Me</h1>

<p class="muted">

Hello! I'm Lukas Doorleijers, a game developer studying at SintLucas.

I mainly work with Unity and C#. My focus is on atmospheric gameplay,
progression systems, and horror experiences.

</p>

</div>

`;

            }

        </script>

    </body>
</html>
